<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule a Meeting — Veld</title>
  <meta http-equiv="refresh" content="0;url=https://veldsystems.com/book">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #030308;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Ambient glow */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: orbFloat 10s ease-in-out infinite, orbFadeIn 2.5s ease forwards;
    }
    .bg-orb:nth-child(1) {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(0, 90, 255, 0.12), transparent 70%);
      top: -18%; left: -8%;
    }
    .bg-orb:nth-child(2) {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(100, 60, 255, 0.1), transparent 70%);
      bottom: -12%; right: -6%;
      animation-delay: 2.5s;
    }
    .bg-orb:nth-child(3) {
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(0, 160, 255, 0.08), transparent 70%);
      top: 40%; left: 55%;
      animation-delay: 5s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(25px, -18px) scale(1.04); }
      66% { transform: translate(-18px, 12px) scale(0.96); }
    }
    @keyframes orbFadeIn { to { opacity: 1; } }

    /* Subtle noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    /* Soft grid */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 80, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 80, 255, 0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 10;
      max-width: 440px;
      padding: 0 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: contentIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }
    @keyframes contentIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Calendar icon */
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 32px;
      opacity: 0;
      animation: iconIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    @keyframes iconIn {
      0% { opacity: 0; transform: scale(0.5) rotate(-8deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .icon svg { width: 100%; height: 100%; }

    .heading {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
      background: linear-gradient(135deg, #ffffff 0%, rgba(255,255,255,0.7) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .desc {
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.5s forwards;
    }

    .label {
      color: rgba(255, 255, 255, 0.2);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.6s forwards;
    }

    /* Progress bar */
    .timer-track {
      width: 180px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
      margin: 0 auto 36px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.65s forwards;
    }
    .timer-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0060ff, #00b0ff);
      border-radius: 2px;
      animation: timerFill 4s linear 1s forwards;
      box-shadow: 0 0 10px rgba(0, 120, 255, 0.5);
    }
    @keyframes timerFill { to { width: 100%; } }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Button */
    .btn-wrap {
      position: relative;
      display: inline-block;
      border-radius: 60px;
      padding: 1.5px;
      background: linear-gradient(270deg, #0060ff, #00bbff, #4040ff, #0080ff, #0060ff);
      background-size: 300% 300%;
      animation: fadeUp 0.8s ease 0.75s forwards, gradShift 5s ease infinite;
      opacity: 0;
    }
    @keyframes gradShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-wrap::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 70px;
      background: linear-gradient(270deg, #0060ff, #00bbff, #4040ff, #0080ff);
      background-size: 300% 300%;
      animation: gradShift 5s ease infinite;
      filter: blur(22px);
      opacity: 0.3;
      z-index: -1;
      transition: opacity 0.4s ease, filter 0.4s ease;
    }
    .btn-wrap:hover::before {
      opacity: 0.65;
      filter: blur(30px);
    }

    .btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: rgba(8, 8, 20, 0.95);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 60px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 80%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 140, 255, 0.12), transparent);
      animation: shimmer 5s ease-in-out 2s infinite;
    }
    @keyframes shimmer {
      0% { left: -120%; }
      35% { left: 120%; }
      100% { left: 120%; }
    }

    .btn:hover {
      background: linear-gradient(135deg, rgba(0, 55, 170, 0.9), rgba(0, 95, 255, 0.8));
      transform: translateY(-3px) scale(1.02);
      letter-spacing: 1.4px;
    }
    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    .btn .arrow {
      display: inline-flex;
      transition: transform 0.3s ease;
    }
    .btn:hover .arrow {
      transform: translateX(4px);
    }

    .arrow svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .footer {
      margin-top: 52px;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.1s forwards;
    }
    .footer span {
      color: rgba(255, 255, 255, 0.1);
      font-size: 11px;
      letter-spacing: 1px;
    }

    /* Particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: rgba(0, 120, 255, 0.35);
      border-radius: 50%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>

  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 56 56" fill="none">
        <!-- Calendar body -->
        <rect x="8" y="12" width="40" height="36" rx="6" stroke="url(#sg)" stroke-width="1.5" fill="none" opacity="0.6"/>
        <!-- Top bar -->
        <path d="M8 22h40" stroke="url(#sg)" stroke-width="1.2" opacity="0.4"/>
        <!-- Hangers -->
        <path d="M20 8v8M36 8v8" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        <!-- Clock circle -->
        <circle cx="28" cy="34" r="9" stroke="url(#sg)" stroke-width="1.3" fill="none" opacity="0.8"/>
        <!-- Clock hands -->
        <path d="M28 29v5l3.5 2.5" stroke="url(#sg)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
        <!-- Center dot -->
        <circle cx="28" cy="34" r="1.2" fill="url(#sg)" opacity="0.9"/>
        <defs>
          <linearGradient id="sg" x1="8" y1="8" x2="48" y2="48">
            <stop offset="0%" stop-color="#0066ff"/>
            <stop offset="100%" stop-color="#00ccff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <h1 class="heading">Let's find a time</h1>
    <p class="desc">Pick a slot that works for you and we'll take it from there.</p>
    <p class="label">Opening scheduler</p>

    <div class="timer-track">
      <div class="timer-fill"></div>
    </div>

    <div class="btn-wrap">
      <a href="https://veldsystems.com/book" class="btn">
        Book a meeting
        <span class="arrow">
          <svg viewBox="0 0 16 16"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </span>
      </a>
    </div>

    <div class="footer">
      <span>veld systems</span>
    </div>
  </div>

  <script>
    (function() {
      var body = document.body;
      for (var i = 0; i < 25; i++) {
        var p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.top = Math.random() * 100 + 'vh';
        p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
        p.style.opacity = Math.random() * 0.35 + 0.08;
        p.style.animation = 'particleFloat ' + (Math.random() * 7 + 5) + 's ease-in-out infinite ' + (Math.random() * 4) + 's';
        body.appendChild(p);
      }

      var style = document.createElement('style');
      style.textContent = '@keyframes particleFloat { 0%, 100% { transform: translate(0, 0); opacity: var(--o, 0.25); } 25% { transform: translate(' + (Math.random()*30-15) + 'px, -' + (Math.random()*40+20) + 'px); } 50% { transform: translate(' + (Math.random()*20-10) + 'px, -' + (Math.random()*60+30) + 'px); opacity: 0.5; } 75% { transform: translate(' + (Math.random()*30-15) + 'px, -' + (Math.random()*40+10) + 'px); } }';
      document.head.appendChild(style);
    })();

    setTimeout(function() {
      window.location.href = "https://veldsystems.com/book";
    }, 0);
  </script>
</body>
</html>
